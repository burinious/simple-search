<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="search-panel" aria-labelledby="page-title">
      <p class="eyebrow">Student Records</p>
      <h1 id="page-title">Simple Student Search</h1>
      <p class="intro">
        Search by matric number, surname, or full name.
      </p>

      <form id="search-form" class="search-form">
        <label class="sr-only" for="search-input">Search student records</label>
        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="Enter matric number or name"
          autocomplete="off"
        >
        <div class="button-row">
          <button type="submit" class="btn btn-primary">Search</button>
          <button type="button" id="clear-button" class="btn btn-secondary">Clear</button>
        </div>
      </form>

      <div id="loading-indicator" class="loading" aria-live="polite" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span id="loading-text">Loading student records...</span>
      </div>

      <section id="results" class="results" aria-live="polite">
        <div class="empty-state">
          Enter a matric number or student name to begin.
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
